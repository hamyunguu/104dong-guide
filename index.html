<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>자양우성아파트1차 104동 안내</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #000;
  }
  .cover {
    display: flex;
    align-items: center;
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    cursor: pointer;
    background: #000;
    padding: 0 24px;
  }
  .cover img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
  }
  .tap-hint {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 32px;
    text-align: center;
    color: #ddd;
    font-size: 14px;
    letter-spacing: 0.02em;
    z-index: 2;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <a class="cover" href="info.html">
    <img src="assets/cover.jpg" alt="자양우성아파트1차 104동">
    <div class="tap-hint">화면을 눌러 안내문 보기</div>
  </a>
</body>
</html>
